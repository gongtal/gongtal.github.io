<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GTCLASS LISTEN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --bg:#F0F4F0; --surface:#fff; --green:#82E0AA; --green-dark:#2E7D52;
    --green-mid:#4CAF7D; --text:#1a1a1a; --text-muted:#7a8a7a; --border:#dde8dd; --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:"Noto Sans KR",sans-serif;min-height:100vh;overflow-x:hidden;}
  header{background:var(--green);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:200;height:56px;box-shadow:0 2px 16px rgba(46,125,82,0.12);}
  .logo{font-family:"Bebas Neue",sans-serif;font-size:24px;letter-spacing:3px;color:var(--green-dark);cursor:pointer;user-select:none;}
  .logo span{opacity:0.5;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .search-wrap{display:none;align-items:center;background:rgba(255,255,255,0.55);border:1px solid rgba(46,125,82,0.2);border-radius:8px;padding:5px 10px;gap:5px;}
  .search-wrap.visible{display:flex;}
  .search-wrap input{background:transparent;border:none;outline:none;font-size:13px;color:var(--green-dark);width:140px;font-family:"Noto Sans KR",sans-serif;}
  .search-wrap input::placeholder{color:rgba(46,125,82,0.4);}
  .stat-pill{background:rgba(255,255,255,0.5);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--green-dark);font-weight:500;display:none;white-space:nowrap;}
  .stat-pill.visible{display:block;}

  .player-bar{background:var(--green-dark);color:white;padding:12px 20px;display:none;position:sticky;top:56px;z-index:190;box-shadow:0 4px 20px rgba(46,125,82,0.2);}
  .player-bar.active{display:block;animation:slideDown 0.25s ease;}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .player-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .player-info{flex:1;min-width:120px;}
  .player-cat{font-size:10px;letter-spacing:2px;opacity:0.5;margin-bottom:2px;font-family:"DM Mono",monospace;text-transform:uppercase;}
  .player-num{font-family:"DM Mono",monospace;font-size:11px;opacity:0.55;margin-bottom:2px;}
  .player-title{font-size:13px;font-weight:600;line-height:1.5;max-width:480px;}
  .player-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .btn-play-main{background:white;color:var(--green-dark);border:none;border-radius:50%;width:40px;height:40px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;flex-shrink:0;}
  .btn-play-main:hover{transform:scale(1.08);}
  .progress-wrap{flex:1;min-width:100px;}
  .progress-track{width:100%;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;cursor:pointer;}
  .progress-fill{height:100%;background:var(--green);border-radius:2px;width:0%;transition:width 0.1s linear;pointer-events:none;}
  .time-info{font-size:11px;opacity:0.5;margin-top:4px;font-family:"DM Mono",monospace;}
  .btn-ctrl{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;transition:background 0.15s;white-space:nowrap;font-family:"Noto Sans KR",sans-serif;}
  .btn-ctrl:hover,.btn-ctrl.on{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4);}
  audio{display:none;}

  main{max-width:960px;margin:0 auto;padding:28px 16px;}
  .screen-title{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:2px;color:var(--green-dark);margin-bottom:4px;}
  .screen-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
  .category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  .category-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:24px 20px;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.03);}
  .category-card:hover{border-color:var(--green-mid);transform:translateY(-3px);box-shadow:0 8px 24px rgba(46,125,82,0.1);}
  .cat-icon{font-size:34px;margin-bottom:12px;}
  .cat-name{font-size:16px;font-weight:700;margin-bottom:4px;}
  .cat-count{font-size:13px;color:var(--text-muted);}

  .back-btn{display:inline-flex;align-items:center;gap:6px;background:white;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--text-muted);margin-bottom:16px;transition:all 0.15s;font-family:"Noto Sans KR",sans-serif;}
  .back-btn:hover{border-color:var(--green-mid);color:var(--green-dark);}
  .page-nav{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .page-nav span{font-size:12px;color:var(--text-muted);margin-right:4px;}
  .page-btn{background:white;border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:13px;cursor:pointer;transition:all 0.15s;color:var(--text-muted);font-family:"Noto Sans KR",sans-serif;}
  .page-btn:hover{border-color:var(--green-mid);color:var(--green-dark);}
  .page-btn.active{background:var(--green-dark);color:white;border-color:var(--green-dark);}

  .phrase-list{display:flex;flex-direction:column;gap:7px;}
  .phrase-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.03);}
  .phrase-card:hover{border-color:var(--green-mid);box-shadow:0 4px 14px rgba(46,125,82,0.08);}
  .phrase-card.paused{border-color:var(--green-mid);background:#f5faf7;}
  .phrase-card.playing{border-color:var(--green-dark);background:#eaf5ef;box-shadow:0 4px 16px rgba(46,125,82,0.12);}
  .card-num{font-family:"DM Mono",monospace;font-size:14px;color:var(--green-mid);font-weight:500;min-width:34px;flex-shrink:0;}
  .phrase-card.playing .card-num,.phrase-card.paused .card-num{color:var(--green-dark);font-weight:700;}
  .card-text{flex:1;font-size:13px;color:var(--text-muted);}
  .phrase-card.playing .card-text,.phrase-card.paused .card-text{color:var(--green-dark);font-weight:500;}

  .wave-wrap{display:none;align-items:center;gap:2px;width:34px;height:34px;justify-content:center;flex-shrink:0;}
  .phrase-card.playing .wave-wrap,.phrase-card.paused .wave-wrap{display:flex;}
  .wave-bar{width:3px;background:var(--green-dark);border-radius:2px;animation:wave 0.7s ease-in-out infinite;}
  .wave-bar:nth-child(1){height:7px;animation-delay:0s}
  .wave-bar:nth-child(2){height:14px;animation-delay:0.12s}
  .wave-bar:nth-child(3){height:10px;animation-delay:0.25s}
  .wave-bar:nth-child(4){height:16px;animation-delay:0.08s}
  .phrase-card.paused .wave-bar{animation-play-state:paused;opacity:0.35;}
  @keyframes wave{0%,100%{transform:scaleY(0.35)}50%{transform:scaleY(1)}}
  .btn-toggle{background:transparent;border:1.5px solid var(--border);border-radius:50%;width:34px;height:34px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;color:var(--text-muted);}
  .btn-toggle:hover{border-color:var(--green-mid);color:var(--green-dark);background:#f0faf4;}
  .phrase-card.playing .btn-toggle,.phrase-card.paused .btn-toggle{display:none;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
  .modal-overlay.active{display:flex;animation:fadeInOverlay 0.2s ease;}
  @keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
  .modal{background:white;border-radius:20px;padding:32px 36px;max-width:620px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.18);position:relative;animation:popUp 0.25s ease;max-height:90vh;overflow-y:auto;}
  @keyframes popUp{from{opacity:0;transform:scale(0.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-close{position:absolute;top:14px;right:16px;background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
  .modal-close:hover{background:var(--border);}
  .modal-num{font-family:"DM Mono",monospace;font-size:11px;color:var(--green-mid);letter-spacing:2px;margin-bottom:12px;}
  .modal-text{font-size:18px;font-weight:500;line-height:1.8;color:#2d5a3d;margin-bottom:24px;word-break:break-word;}
  .modal-text.highlight{color:var(--green-dark);font-weight:600;}
  .modal-player{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .modal-btn-play{background:var(--green-dark);color:white;border:none;border-radius:50%;width:46px;height:46px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;flex-shrink:0;}
  .modal-btn-play:hover{transform:scale(1.08);}
  .modal-progress-wrap{flex:1;min-width:80px;}
  .modal-progress-track{width:100%;height:4px;background:var(--border);border-radius:2px;cursor:pointer;}
  .modal-progress-fill{height:100%;background:var(--green-dark);border-radius:2px;width:0%;transition:width 0.1s linear;pointer-events:none;}
  .modal-time{font-family:"DM Mono",monospace;font-size:11px;color:var(--text-muted);margin-top:4px;}
  .modal-nav{display:flex;gap:7px;}
  .modal-nav-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text-muted);transition:all 0.15s;font-family:"Noto Sans KR",sans-serif;}
  .modal-nav-btn:hover{border-color:var(--green-mid);color:var(--green-dark);}
  .modal-wave{display:none;align-items:center;gap:2px;}
  .modal-wave.active{display:flex;}
  .modal-wave .wave-bar{width:3px;background:var(--green-dark);border-radius:2px;animation:wave 0.7s ease-in-out infinite;}
  .modal-wave .wave-bar:nth-child(1){height:7px;animation-delay:0s}
  .modal-wave .wave-bar:nth-child(2){height:14px;animation-delay:0.12s}
  .modal-wave .wave-bar:nth-child(3){height:10px;animation-delay:0.25s}
  .modal-wave .wave-bar:nth-child(4){height:16px;animation-delay:0.08s}
  .empty{text-align:center;padding:60px;color:var(--text-muted);}
  @media(max-width:500px){.modal{padding:24px 18px;}.modal-text{font-size:16px;}.player-title{font-size:12px;}}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">GTCLASS<span>_</span>LISTEN</div>
  <div class="header-right">
    <div class="search-wrap" id="searchWrap">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="번호 또는 구문 검색">
    </div>
    <div class="stat-pill" id="statPill"></div>
  </div>
</header>

<div class="player-bar" id="playerBar">
  <div class="player-inner">
    <div class="player-info">
      <div class="player-cat" id="playerCat"></div>
      <div class="player-num" id="playerNum"></div>
      <div class="player-title" id="playerTitle">—</div>
    </div>
    <div class="player-controls">
      <button class="btn-play-main" id="btnPlayMain" onclick="togglePlay()">▶</button>
      <div class="progress-wrap">
        <div class="progress-track" onclick="seekAudio(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-info" id="timeInfo">0:00 / 0:00</div>
      </div>
      <button class="btn-ctrl" id="btnRepeat" onclick="toggleRepeat()">🔁 반복</button>
    </div>
  </div>
</div>

<audio id="audio" onended="onEnd()" ontimeupdate="onTick()"></audio>

<main>
  <div id="categoryScreen">
    <div class="screen-title">카테고리 선택</div>
    <div class="screen-sub">듣고 싶은 카테고리를 선택하세요</div>
    <div class="category-grid" id="categoryGrid"></div>
  </div>
  <div id="listScreen" style="display:none">
    <button class="back-btn" onclick="goHome()">← 카테고리로 돌아가기</button>
    <div class="page-nav" id="pageNav"></div>
    <div class="phrase-list" id="phraseList"></div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-num" id="modalNum">NO. —</div>
    <div class="modal-text" id="modalText">—</div>
    <div class="modal-player">
      <button class="modal-btn-play" id="modalBtnPlay" onclick="togglePlay()">▶</button>
      <div class="modal-progress-wrap">
        <div class="modal-progress-track" onclick="seekAudio(event)">
          <div class="modal-progress-fill" id="modalProgressFill"></div>
        </div>
        <div class="modal-time" id="modalTime">0:00 / 0:00</div>
      </div>
      <div class="modal-wave" id="modalWave">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
      </div>
      <div class="modal-nav">
        <button class="modal-nav-btn" onclick="modalPrev()">◀ 이전</button>
        <button class="modal-nav-btn" onclick="modalNext()">다음 ▶</button>
      </div>
    </div>
  </div>
</div>

<script>
  let currentCat=null,currentFiles=[],currentIdx=-1,isPlaying=false,isRepeat=false,currentPage=1;
  const perPage=50;

  function renderCategories(){
    document.getElementById('categoryGrid').innerHTML=CATEGORIES.map((cat,i)=>`
      <div class="category-card" onclick="openCategory(${i})">
        <div class="cat-icon">${cat.icon||'🎧'}</div>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-count">총 ${cat.files.length}개 구문</div>
      </div>`).join('');
    document.getElementById('categoryScreen').style.display='block';
    document.getElementById('listScreen').style.display='none';
    document.getElementById('searchWrap').classList.remove('visible');
    document.getElementById('statPill').classList.remove('visible');
  }

  function openCategory(idx){
    currentCat=CATEGORIES[idx];currentFiles=[...currentCat.files];currentPage=1;
    document.getElementById('categoryScreen').style.display='none';
    document.getElementById('listScreen').style.display='block';
    document.getElementById('searchWrap').classList.add('visible');
    document.getElementById('statPill').classList.add('visible');
    document.getElementById('statPill').textContent=`${currentFiles.length}개`;
    document.getElementById('searchInput').value='';
    renderList();
  }

  function goHome(){currentCat=null;currentFiles=[];renderCategories();}

  document.getElementById('searchInput').addEventListener('input',e=>{
    const q=e.target.value.trim().toLowerCase();
    currentFiles=q?currentCat.files.filter(f=>String(f.num).includes(q)||f.text.toLowerCase().includes(q)):[...currentCat.files];
    currentPage=1;
    document.getElementById('statPill').textContent=`${currentFiles.length}개`;
    renderList();
  });

  function renderList(){
    renderPageNav();
    const start=(currentPage-1)*perPage;
    const page=currentFiles.slice(start,start+perPage);
    const list=document.getElementById('phraseList');
    if(!page.length){list.innerHTML='<div class="empty">검색 결과가 없어요 😅</div>';return;}
    list.innerHTML=page.map(item=>{
      const isActive=item.num-1===currentIdx;
      const stateClass=isActive?(isPlaying?'playing':'paused'):'';
      return `<div class="phrase-card ${stateClass}" id="card-${item.num-1}" onclick="handleCardClick(${item.num-1})">
        <div class="card-num">${String(item.num).padStart(3,'0')}</div>
        <div class="card-text">영어 구문 ${item.num}번</div>
        <div class="wave-wrap"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
        <button class="btn-toggle" onclick="event.stopPropagation();handleCardClick(${item.num-1})">▶</button>
      </div>`;
    }).join('');
  }

  function renderPageNav(){
    const total=Math.ceil(currentFiles.length/perPage);
    const nav=document.getElementById('pageNav');
    if(total<=1){nav.innerHTML='';return;}
    let html='<span>페이지:</span>';
    for(let i=1;i<=total;i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    nav.innerHTML=html;
  }

  function goPage(p){currentPage=p;renderList();window.scrollTo({top:0,behavior:'smooth'});}

  function handleCardClick(idx){
    openModal(idx);
    if(currentIdx!==idx) playItem(idx);
  }

  function playItem(idx){
    currentIdx=idx;isPlaying=true;
    const item=currentCat.files[idx];
    const audio=document.getElementById('audio');
    audio.src = item.url;
    audio.play().catch(e=>console.log(e));
    document.getElementById('playerBar').classList.add('active');
    document.getElementById('playerCat').textContent=currentCat.name;
    document.getElementById('playerNum').textContent=`NO. ${String(idx+1).padStart(3,'0')}`;
    document.getElementById('playerTitle').textContent=item.text||`영어 구문 ${idx+1}번`;
    document.getElementById('btnPlayMain').textContent='⏸';
    updateModalPlayer();renderList();
    setTimeout(()=>{const el=document.getElementById(`card-${idx}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);
  }

  function openModal(idx){
    const item=currentCat.files[idx];
    document.getElementById('modalNum').textContent='NO. '+String(idx+1).padStart(3,'0');
    document.getElementById('modalText').textContent=item.text||`영어 구문 ${idx+1}번`;
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow='hidden';
    updateModalPlayer();
  }

  function closeModal(){document.getElementById('modalOverlay').classList.remove('active');document.body.style.overflow='';}
  function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
  function modalPrev(){if(currentIdx>0){playItem(currentIdx-1);openModal(currentIdx);}}
  function modalNext(){if(currentCat&&currentIdx<currentCat.files.length-1){playItem(currentIdx+1);openModal(currentIdx);}}

  function updateModalPlayer(){
    document.getElementById('modalBtnPlay').textContent=isPlaying?'⏸':'▶';
    document.getElementById('modalWave').classList.toggle('active',isPlaying);
    document.getElementById('modalText').classList.toggle('highlight',isPlaying);
  }

  function togglePlay(){
    const audio=document.getElementById('audio');
    if(!audio.src||currentIdx===-1)return;
    if(audio.paused){audio.play();isPlaying=true;document.getElementById('btnPlayMain').textContent='⏸';}
    else{audio.pause();isPlaying=false;document.getElementById('btnPlayMain').textContent='▶';}
    updateModalPlayer();renderList();
  }

  function toggleRepeat(){
    isRepeat=!isRepeat;
    const btn=document.getElementById('btnRepeat');
    btn.textContent=isRepeat?'🔁 반복 ON':'🔁 반복';
    btn.classList.toggle('on',isRepeat);
  }

  function onEnd(){
    isPlaying=false;
    document.getElementById('btnPlayMain').textContent='▶';
    updateModalPlayer();
    if(isRepeat){
      const audio=document.getElementById('audio');
      audio.currentTime=0;audio.play();
      isPlaying=true;document.getElementById('btnPlayMain').textContent='⏸';
      updateModalPlayer();
    }
    renderList();
  }

  function onTick(){
    const audio=document.getElementById('audio');
    if(!audio.duration)return;
    const pct=(audio.currentTime/audio.duration*100)+'%';
    document.getElementById('progressFill').style.width=pct;
    document.getElementById('timeInfo').textContent=`${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    document.getElementById('modalProgressFill').style.width=pct;
    document.getElementById('modalTime').textContent=`${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  }

  function seekAudio(e){
    const audio=document.getElementById('audio');
    if(!audio.duration)return;
    const rect=e.currentTarget.getBoundingClientRect();
    audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
  }

  function fmt(s){return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

  renderCategories();
</script>
</body>
</html>
